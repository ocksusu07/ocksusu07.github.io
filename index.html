<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Cat's Warp Journey 🚀</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --primary: #AEEA00;
            --accent: #FFE082;
            --text: #ffffff;
            --warp-core: #00E5FF;
        }

        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; transition: all 0.3s ease; }
        
        body {
            background: #050811; color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            overflow: hidden; position: relative;
        }

        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .app-container {
            width: 100%; max-width: 440px; 
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 40px; padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            text-align: center; position: relative; z-index: 10;
        }

        #timer-display {
            font-size: 1.8rem; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 15px rgba(255, 224, 130, 0.5);
            opacity: 0; margin-bottom: 10px; height: 40px;
        }
        #timer-display.active { opacity: 1; }

        .avatar-box { height: 160px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        #cat-img { max-width: 150px; filter: drop-shadow(0 0 15px rgba(174, 234, 0, 0.4)); }
        .bounce { transform: scale(1.3) rotate(5deg) !important; }

        .repair-container { margin-bottom: 25px; opacity: 0; transition: opacity 0.5; position: relative; }
        .repair-container.active { opacity: 1; }
        
        .repair-label {
            font-size: 0.85rem; font-weight: 800; color: var(--primary);
            margin-bottom: 10px; display: flex; justify-content: space-between;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .progress-bar-bg {
            width: 100%; height: 16px; background: rgba(255, 255, 255, 0.08);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .progress-bar-fill {
            width: 0%; height: 100%; background: linear-gradient(90deg, #AEEA00, var(--warp-core));
            box-shadow: 0 0 15px rgba(174, 234, 0, 0.4);
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative; border-radius: 20px; overflow: hidden;
        }

        #spaceship-pointer {
            position: absolute; top: 50%; left: -10px; 
            transform: translateY(-50%) rotate(45deg); 
            font-size: 26px; filter: drop-shadow(0 0 8px var(--warp-core));
            opacity: 0; transition: left 0.8s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
            z-index: 15; pointer-events: none;
        }
        #spaceship-pointer.active { opacity: 1; }

        .status-msg {
            font-size: 0.95rem; line-height: 1.6; color: rgba(255, 255, 255, 0.9);
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px;
            margin-bottom: 25px; min-height: 60px; border: 1px solid rgba(174, 234, 0, 0.2);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; padding: 16px; border: 1px solid var(--glass-border);
            border-radius: 18px; background: rgba(255, 255, 255, 0.05);
            color: #fff; outline: none; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }
        .btn-add { padding: 0 24px; background: var(--accent); color: #1e1e2e; border: none; border-radius: 18px; font-weight: 900; cursor: pointer; }

        .todo-list { list-style: none; padding: 0 5px 0 0; margin: 0 0 20px 0; max-height: 220px; overflow-y: auto; }
        .todo-list::-webkit-scrollbar { width: 6px; }
        .todo-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        .todo-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1);
        }

        .todo-text { font-weight: 600; font-size: 0.95rem; text-align: left; flex: 1; margin-right: 10px; }
        .feed-btn { background: var(--primary); color: #1e3718; border: none; border-radius: 12px; padding: 8px 16px; cursor: pointer; font-weight: 800; }

        #start-btn {
            width: 100%; padding: 20px; background: rgba(174, 234, 0, 0.1);
            color: var(--primary); border: 2px solid var(--primary);
            border-radius: 25px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
        }
        #start-btn:hover { background: var(--primary); color: #1e3718; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(174, 234, 0, 0.3); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="app-container">
        <div id="timer-display">00:00</div>
        <div class="avatar-box">
            <src="image-removebg-preview.png" id="cat-img" alt="Alien Cat">
        </div>
        <div id="repair-section" class="repair-container">
            <div class="repair-label">
                <span>📍 행성 도착까지</span>
                <span id="repair-percent">READY</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
                <div id="spaceship-pointer">🚀</div>
            </div>
        </div>
        <div id="msg" class="status-msg">외계 고양이와 여행 중...<br>은하계 너머 행성으로 떠나보자! 👽🐱</div>
        <div id="input-section">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="여정의 목표 입력..." autocomplete="off">
                <button class="btn-add" onclick="addTask()">추가</button>
            </div>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
        <div id="action-section">
            <button id="start-btn" onclick="startRoutine()">🌌 차원 이동 시작</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let speed = 0.5; 
    let warpActive = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Star {
        constructor() { this.reset(); }
        reset() {
            this.x = (Math.random() - 0.5) * canvas.width * 2;
            this.y = (Math.random() - 0.5) * canvas.height * 2;
            this.z = Math.random() * canvas.width;
            this.size = Math.random() * 2;
        }
        update() {
            this.z -= speed;
            if (this.z <= 0) this.reset();
        }
        draw() {
            let sx = (this.x / this.z) * canvas.width + canvas.width / 2;
            let sy = (this.y / this.z) * canvas.height + canvas.height / 2;
            let r = (1 - this.z / canvas.width) * 3;
            ctx.beginPath();
            ctx.fillStyle = "white";
            ctx.arc(sx, sy, r / 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 400; i++) stars.push(new Star());

    function animate() {
        ctx.fillStyle = "rgba(5, 8, 17, 0.2)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    function triggerWarp() {
        warpActive = true;
        speed = 45; 
        setTimeout(() => {
            speed = 0.5;
            warpActive = false;
            stars.forEach(s => s.reset());
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 1200); 
    }

    let totalTasks = 0, completedTasks = 0, todos = [], isStarted = false, seconds = 0, timerInterval = null;
    const catImg = document.getElementById('cat-img'), timerEl = document.getElementById('timer-display'), 
          msgEl = document.getElementById('msg'), repairSection = document.getElementById('repair-section'),
          progressFill = document.getElementById('progress-fill'), repairPercent = document.getElementById('repair-percent'),
          shipPointer = document.getElementById('spaceship-pointer');

    const completeMsgs = ["슝! 은하계 돌파 완료!", "초광속 점프 성공! 🌠", "다음 성계로 진입 중!", "엔진 출력 정상! 🔥"];
    const planetMsgs = ["버블티 행성", "냥냥 펀치 행성", "치즈 케이크 행성", "삼겹살 행성", "소주 은하 행성"];

    function updateProgress() {
        if (totalTasks === 0) return;
        const percent = Math.round((completedTasks / totalTasks) * 100);
        
        // 🛠️ 거꾸로 표현: 남은 km 계산 (할 일이 다 남았을 때 10,000km)
        const remainingDistance = Math.round(((totalTasks - completedTasks) / totalTasks) * 10000);
        
        progressFill.style.width = percent + '%';
        shipPointer.style.left = `calc(${percent}% - 12px)`;
        
        if (percent === 100) {
            const randomPlanet = planetMsgs[Math.floor(Math.random() * planetMsgs.length)];
            repairPercent.innerText = `0km - ${randomPlanet} 도착! 🪐`;
        } else {
            repairPercent.innerText = `${remainingDistance.toLocaleString()}km 남음`;
        }

        if (percent > 0) shipPointer.classList.add('active');
    }

    function addTask() {
        const input = document.getElementById('todo-input');
        if (!input.value.trim()) return;
        todos.push({ id: Date.now(), text: input.value });
        renderTodos();
        input.value = "";
    }

    function renderTodos() {
        const list = document.getElementById('todo-list');
        list.innerHTML = todos.map(t => `
            <li class="todo-item">
                <span class="todo-text">${t.text}</span>
                ${isStarted ? `<button class="feed-btn" onclick="completeTask(${t.id})">워프 ✨</button>` : ''}
            </li>
        `).join('');
    }

    function startRoutine() {
        if (todos.length === 0) return alert("여행 경로를 먼저 입력해줘!");
        isStarted = true; totalTasks = todos.length; completedTasks = 0;
        timerEl.classList.add('active'); repairSection.classList.add('active');
        document.getElementById('input-section').classList.add('hidden');
        document.getElementById('start-btn').classList.add('hidden');
        timerInterval = setInterval(() => { seconds++; timerEl.innerText = formatTime(seconds); }, 1000);
        msgEl.innerText = "차원 도약 시작! 집중해봐. 👽📡";
        updateProgress(); renderTodos();
    }

    function completeTask(id) {
        triggerWarp(); 
        catImg.classList.add('bounce'); setTimeout(() => catImg.classList.remove('bounce'), 300);
        todos = todos.filter(t => t.id !== id);
        completedTasks++; updateProgress(); renderTodos();
        msgEl.innerText = completeMsgs[Math.floor(Math.random() * completeMsgs.length)];

        if (todos.length === 0) {
            clearInterval(timerInterval);
            const randomPlanet = planetMsgs[Math.floor(Math.random() * planetMsgs.length)];
            msgEl.innerHTML = `정복 완료! 🪐<br>총 <b>${formatTime(seconds)}</b> 동안 항해했어.`;
            isStarted = false;
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('start-btn').classList.remove('hidden');
        } 
    }

    function formatTime(s) {
        const min = String(Math.floor(s / 60)).padStart(2, '0');
        const sec = String(s % 60).padStart(2, '0');
        return `${min}:${sec}`;
    }
</script>
</body>
</html>
